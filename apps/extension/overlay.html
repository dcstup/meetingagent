<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div class="yc-shell">
    <header class="yc-header">
      <img src="logo.png" alt="YesChef" class="yc-header-logo">
      <h1 class="yc-header-title">YesChef</h1>
      <span id="yc-status" class="yc-header-status">Connecting...</span>
      <button id="yc-close" class="yc-header-close">&times;</button>
    </header>

    <div class="yc-content">
      <!-- Transcript Section -->
      <section class="yc-section" id="transcript-section">
        <h2 class="yc-section-title">Live Transcript</h2>
        <div id="transcript-feed" class="yc-transcript-feed">
          <p class="yc-empty">Waiting for meeting to start...</p>
        </div>
      </section>

      <!-- Proposals Section -->
      <section class="yc-section" id="proposals-section">
        <h2 class="yc-section-title">Action Items</h2>
        <div id="proposals-list" class="yc-proposals-list">
          <p class="yc-empty">No proposals yet</p>
        </div>
      </section>

      <!-- Dropped Items Section (gate-rejected) -->
      <div id="dropped-section" style="display:none">
        <div class="yc-section-header" id="dropped-toggle" style="cursor:pointer">
          Dropped by Gate &#9656;
        </div>
        <div id="dropped-list" style="display:none"></div>
      </div>

      <!-- Filtered Items Section (pre-gate filter, debug only) -->
      <div id="filtered-section" style="display:none">
        <div class="yc-section-header" id="filtered-toggle" style="cursor:pointer">
          Filtered Out (Pre-Gate) &#9656;
        </div>
        <div id="filtered-list" style="display:none"></div>
      </div>

      <!-- Debug Stats (debug only) -->
      <div id="debug-stats" style="display:none">
        <div class="yc-section-header">Pipeline Stats</div>
        <div id="debug-stats-content" class="yc-debug-stats-content"></div>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="overlay.js"></script>
</body>
</html>

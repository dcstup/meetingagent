services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL:-}
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000 --log stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    restart: unless-stopped
